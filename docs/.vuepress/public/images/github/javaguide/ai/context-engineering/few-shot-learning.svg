<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" style="background-color:#F8FAFC;font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<defs>
<pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
<path d="M30 0 L0 0 0 30" fill="none" stroke="#E2E8F0" stroke-width="1"/>
</pattern>
<filter id="cs"><feDropShadow dx="2" dy="6" stdDeviation="10" flood-color="#005D7B" flood-opacity="0.08"/></filter>
</defs>
<rect width="100%" height="100%" fill="url(#grid)"/>

<text x="450" y="48" text-anchor="middle" font-size="24" font-weight="bold" fill="#005D7B">少样本学习 (Few-Shot)</text>

<!-- Instruction card -->
<rect x="40" y="75" width="820" height="48" rx="10" fill="#FFF" filter="url(#cs)"/>
<rect x="40" y="75" width="6" height="48" fill="#005D7B" rx="3"/>
<text x="60" y="104" font-size="13" fill="#64748B">任务指令：从文本中提取人名、年龄、职业，输出 JSON 格式</text>

<!-- Arrow down -->
<line x1="450" y1="125" x2="450" y2="148" stroke="#94A3B8" stroke-width="2"/>
<polygon points="445,148 450,160 455,148" fill="#94A3B8"/>
<text x="470" y="144" font-size="11" font-weight="bold" fill="#E99151">示例 1</text>

<!-- Example 1 -->
<rect x="40" y="163" width="395" height="50" rx="8" fill="#FFF3E0" filter="url(#cs)"/>
<text x="55" y="183" font-size="11" fill="#64748B" font-style="italic">输入：张三今年 25 岁，是一名软件工程师。</text>
<text x="55" y="201" font-size="11" fill="#E99151" font-family="monospace">输出：{"name":"张三","age":25,"occupation":"软件工程师"}</text>

<!-- Arrow from ex1 to ex2 -->
<line x1="450" y1="188" x2="488" y2="188" stroke="#94A3B8" stroke-width="2"/>
<polygon points="488,188 478,183 478,193" fill="#94A3B8"/>

<!-- Example 2 -->
<rect x="495" y="163" width="365" height="50" rx="8" fill="#FFF3E0" filter="url(#cs)"/>
<text x="510" y="183" font-size="11" fill="#64748B" font-style="italic">输入：李明，32 岁，产品经理。</text>
<text x="510" y="201" font-size="11" fill="#E99151" font-family="monospace">输出：{"name":"李明","age":32,"occupation":"产品经理"}</text>

<!-- Arrow down to target -->
<line x1="450" y1="215" x2="450" y2="238" stroke="#94A3B8" stroke-width="2"/>
<polygon points="445,238 450,250 455,238" fill="#94A3B8"/>
<text x="470" y="234" font-size="11" font-weight="bold" fill="#005D7B">实际任务</text>

<!-- Target input -->
<rect x="40" y="255" width="820" height="45" rx="8" fill="#E0F2F8" filter="url(#cs)"/>
<text x="60" y="282" font-size="13" fill="#64748B">输入：王芳 28 岁，是一名数据分析师。</text>
<text x="790" y="282" text-anchor="end" font-size="12" font-weight="bold" fill="#005D7B">输出：？</text>

<!-- Arrow down to model -->
<line x1="450" y1="302" x2="450" y2="318" stroke="#94A3B8" stroke-width="2"/>
<polygon points="445,318 450,330 455,318" fill="#94A3B8"/>

<!-- Model output -->
<rect x="200" y="335" width="500" height="42" rx="8" fill="#FFF" filter="url(#cs)" stroke="#4CA497" stroke-width="1.5"/>
<text x="220" y="361" font-size="13" fill="#4CA497" font-weight="bold" font-family="monospace">{"name":"王芳","age":28,"occupation":"数据分析师"}</text>

<!-- Right side: principles -->
<rect x="680" y="80" width="180" height="140" rx="10" fill="#FFF" filter="url(#cs)" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="5,3"/>
<text x="770" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#005D7B">示例选择原则</text>
<line x1="695" y1="115" x2="845" y2="115" stroke="#E2E8F0" stroke-width="1"/>
<text x="695" y="135" font-size="11" fill="#64748B">1. 相关性</text>
<text x="695" y="155" font-size="11" fill="#64748B">2. 多样性</text>
<text x="695" y="175" font-size="11" fill="#64748B">3. 清晰性</text>
<text x="695" y="205" font-size="10" fill="#94A3B8">1-3 个最佳，超过 3 个收益递减</text>

<!-- Watermark -->
<g transform="translate(735,400) rotate(-5)">
<text x="0" y="0" font-size="14" font-weight="bold" fill="#94A3B8">公众号：<tspan fill="#005D7B">JavaGuide</tspan></text>
<text x="0" y="20" font-size="14" font-weight="bold" fill="#94A3B8">网站：<tspan fill="#005D7B">javaguide.cn</tspan></text>
</g>
</svg>
