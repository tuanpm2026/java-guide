<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" style="background-color:#F8FAFC;font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<defs>
<pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
<path d="M30 0 L0 0 0 30" fill="none" stroke="#E2E8F0" stroke-width="1"/>
</pattern>
<filter id="cs"><feDropShadow dx="2" dy="6" stdDeviation="10" flood-color="#005D7B" flood-opacity="0.08"/></filter>
<clipPath id="c1"><rect x="25" y="75" width="260" height="355" rx="10"/></clipPath>
<clipPath id="c2"><rect x="320" y="75" width="260" height="355" rx="10"/></clipPath>
<clipPath id="c3"><rect x="615" y="75" width="260" height="355" rx="10"/></clipPath>
</defs>
<rect width="100%" height="100%" fill="url(#grid)"/>

<text x="450" y="48" text-anchor="middle" font-size="24" font-weight="bold" fill="#005D7B">CoT 三种形态演进</text>

<!-- Column 1: Zero-shot -->
<rect x="25" y="75" width="260" height="355" rx="10" fill="#FFF" filter="url(#cs)"/>
<rect x="25" y="75" width="260" height="36" fill="#E6F7ED" clip-path="url(#c1)"/>
<text x="155" y="99" text-anchor="middle" font-size="14" font-weight="bold" fill="#4CA497">Zero-shot CoT</text>
<rect x="110" y="122" width="56" height="20" rx="10" fill="#4CA497"/>
<text x="138" y="136" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF">基础</text>

<text x="40" y="164" font-size="12" fill="#64748B">触发方式：</text>
<rect x="40" y="174" width="230" height="68" rx="6" fill="#F0F4F8" stroke="#CBD5E1" stroke-width="0.5"/>
<text x="52" y="194" font-size="11" fill="#64748B" font-family="monospace">请分析这道题。</text>
<text x="52" y="210" font-size="11" fill="#64748B" font-family="monospace">80 的 15% 是多少？</text>
<text x="52" y="230" font-size="11" fill="#DC2626" font-weight="bold" font-family="monospace">请一步步思考。</text>

<text x="40" y="266" font-size="12" fill="#64748B">特点：</text>
<text x="40" y="288" font-size="12" fill="#64748B">- 无需提供推理示例</text>
<text x="40" y="306" font-size="12" fill="#64748B">- 模型自行组织推理</text>
<text x="40" y="324" font-size="12" fill="#64748B">- 简单任务效果不错</text>
<text x="40" y="404" font-size="11" fill="#94A3B8">适合：数学计算、简单推理</text>

<!-- Arrow 1→2 -->
<line x1="287" y1="252" x2="316" y2="252" stroke="#94A3B8" stroke-width="2"/>
<polygon points="316,252 306,247 306,257" fill="#94A3B8"/>

<!-- Column 2: 引导式 -->
<rect x="320" y="75" width="260" height="355" rx="10" fill="#FFF" filter="url(#cs)"/>
<rect x="320" y="75" width="260" height="36" fill="#E0F2F8" clip-path="url(#c2)"/>
<text x="450" y="99" text-anchor="middle" font-size="14" font-weight="bold" fill="#005D7B">引导式 CoT</text>
<rect x="405" y="122" width="56" height="20" rx="10" fill="#005D7B"/>
<text x="433" y="136" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF">推荐</text>

<text x="335" y="164" font-size="12" fill="#64748B">触发方式：</text>
<rect x="335" y="174" width="230" height="68" rx="6" fill="#F0F4F8" stroke="#CBD5E1" stroke-width="0.5"/>
<text x="347" y="190" font-size="11" fill="#DC2626" font-weight="bold" font-family="monospace">在回答前，先思考：</text>
<text x="347" y="206" font-size="11" fill="#64748B" font-family="monospace">1. 关键变量是什么？</text>
<text x="347" y="222" font-size="11" fill="#64748B" font-family="monospace">2. 变量间什么关系？</text>
<text x="347" y="238" font-size="11" fill="#64748B" font-family="monospace">3. 答案如何验证？</text>

<text x="335" y="266" font-size="12" fill="#64748B">特点：</text>
<text x="335" y="288" font-size="12" fill="#64748B">- 引导推理方向</text>
<text x="335" y="306" font-size="12" fill="#64748B">- 提高推理质量</text>
<text x="335" y="324" font-size="12" fill="#64748B">- 过程透明可调试</text>
<text x="335" y="404" font-size="11" fill="#94A3B8">适合：多步骤分析、方案设计</text>

<!-- Arrow 2→3 -->
<line x1="582" y1="252" x2="611" y2="252" stroke="#94A3B8" stroke-width="2"/>
<polygon points="611,252 601,247 601,257" fill="#94A3B8"/>

<!-- Column 3: 结构化 -->
<rect x="615" y="75" width="260" height="355" rx="10" fill="#FFF" filter="url(#cs)"/>
<rect x="615" y="75" width="260" height="36" fill="#EDE9FE" clip-path="url(#c3)"/>
<text x="745" y="99" text-anchor="middle" font-size="14" font-weight="bold" fill="#7C3AED">结构化 CoT</text>
<rect x="700" y="122" width="56" height="20" rx="10" fill="#7C3AED"/>
<text x="728" y="136" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF">最强</text>

<text x="630" y="164" font-size="12" fill="#64748B">触发方式：</text>
<rect x="630" y="174" width="230" height="68" rx="6" fill="#F0F4F8" stroke="#CBD5E1" stroke-width="0.5"/>
<text x="642" y="190" font-size="11" fill="#7C3AED" font-weight="bold" font-family="monospace">&lt;thinking&gt;</text>
<text x="652" y="206" font-size="11" fill="#64748B" font-family="monospace">1. 15% = 0.15</text>
<text x="652" y="222" font-size="11" fill="#64748B" font-family="monospace">2. 0.15 x 80 = 12</text>
<text x="652" y="238" font-size="11" fill="#64748B" font-family="monospace">3. 验证: 12/80=0.15</text>

<text x="630" y="266" font-size="12" fill="#64748B">特点：</text>
<text x="630" y="288" font-size="12" fill="#64748B">- 推理与答案分离</text>
<text x="630" y="306" font-size="12" fill="#64748B">- 结构化可编程解析</text>
<text x="630" y="324" font-size="12" fill="#64748B">- 最高准确率保证</text>
<text x="630" y="404" font-size="11" fill="#94A3B8">适合：代码诊断、逻辑推理</text>

<!-- Watermark -->
<g transform="translate(735,440) rotate(-5)">
<text x="0" y="0" font-size="14" font-weight="bold" fill="#94A3B8">公众号：<tspan fill="#005D7B">JavaGuide</tspan></text>
<text x="0" y="20" font-size="14" font-weight="bold" fill="#94A3B8">网站：<tspan fill="#005D7B">javaguide.cn</tspan></text>
</g>
</svg>
