<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="background-color: #F8FAFC; font-family: system-ui, sans-serif;">
    <defs>
        <pattern id="dot-bg-1" width="24" height="24" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.5" fill="#E2E8F0" />
        </pattern>
        <filter id="shadow-soft" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#005D7B" flood-opacity="0.06" />
        </filter>
    </defs>

    <rect width="100%" height="100%" fill="url(#dot-bg-1)" />
    
    <text x="400" y="50" text-anchor="middle" font-size="24" font-weight="bold" fill="#005D7B">Prompt vs Context 工程维度对比</text>

    <g transform="translate(80, 100)">
        <rect width="300" height="280" rx="16" fill="#FFFFFF" filter="url(#shadow-soft)" />
        <rect width="300" height="6" rx="3" fill="#E99151" />
        <text x="150" y="45" text-anchor="middle" font-size="18" font-weight="bold" fill="#E99151">Prompt Engineering</text>
        <text x="150" y="70" text-anchor="middle" font-size="14" fill="#64748B">“教厨师做菜的口诀”</text>
        <line x1="30" y1="90" x2="270" y2="90" stroke="#E2E8F0" stroke-width="1" />
        
        <rect x="50" y="120" width="200" height="36" rx="6" fill="#FFF5ED" stroke="#E99151" stroke-width="1" />
        <text x="150" y="143" text-anchor="middle" font-size="14" fill="#E99151">系统指令 (System)</text>
        
        <rect x="50" y="170" width="200" height="36" rx="6" fill="#FFF5ED" stroke="#E99151" stroke-width="1" />
        <text x="150" y="193" text-anchor="middle" font-size="14" fill="#E99151">少样本示例 (Few-Shot)</text>
        
        <rect x="50" y="220" width="200" height="36" rx="6" fill="#FFF5ED" stroke="#E99151" stroke-width="1" />
        <text x="150" y="243" text-anchor="middle" font-size="14" fill="#E99151">思维链引导 (CoT)</text>
    </g>

    <circle cx="400" cy="240" r="20" fill="#F8FAFC" stroke="#005D7B" stroke-width="2" />
    <text x="400" y="246" text-anchor="middle" font-size="14" font-weight="bold" fill="#005D7B">VS</text>

    <g transform="translate(420, 100)">
        <rect width="300" height="280" rx="16" fill="#FFFFFF" filter="url(#shadow-soft)" />
        <rect width="300" height="6" rx="3" fill="#4CA497" />
        <text x="150" y="45" text-anchor="middle" font-size="18" font-weight="bold" fill="#4CA497">Context Engineering</text>
        <text x="150" y="70" text-anchor="middle" font-size="14" fill="#64748B">“配备齐全的厨房生态”</text>
        <line x1="30" y1="90" x2="270" y2="90" stroke="#E2E8F0" stroke-width="1" />
        
        <g transform="translate(50, 110)">
            <rect width="95" height="70" rx="8" fill="#F2FAF8" stroke="#4CA497" stroke-width="1" />
            <text x="47" y="35" text-anchor="middle" font-size="13" font-weight="bold" fill="#4CA497">记忆系统</text>
            <text x="47" y="55" text-anchor="middle" font-size="11" fill="#64748B">长期/短期状态</text>
        </g>
        <g transform="translate(155, 110)">
            <rect width="95" height="70" rx="8" fill="#F2FAF8" stroke="#4CA497" stroke-width="1" />
            <text x="47" y="35" text-anchor="middle" font-size="13" font-weight="bold" fill="#4CA497">RAG 检索</text>
            <text x="47" y="55" text-anchor="middle" font-size="11" fill="#64748B">动态事实供给</text>
        </g>
        <g transform="translate(50, 190)">
            <rect width="95" height="70" rx="8" fill="#F2FAF8" stroke="#4CA497" stroke-width="1" />
            <text x="47" y="35" text-anchor="middle" font-size="13" font-weight="bold" fill="#4CA497">工具挂载</text>
            <text x="47" y="55" text-anchor="middle" font-size="11" fill="#64748B">MCP 按需加载</text>
        </g>
        <g transform="translate(155, 190)">
            <rect width="95" height="70" rx="8" fill="#F2FAF8" stroke="#4CA497" stroke-width="1" />
            <text x="47" y="35" text-anchor="middle" font-size="13" font-weight="bold" fill="#4CA497">Token 优化</text>
            <text x="47" y="55" text-anchor="middle" font-size="11" fill="#64748B">压缩与垃圾回收</text>
        </g>
    </g>

    <g transform="translate(620, 400) rotate(-5)">
        <text x="0" y="0" font-size="14" font-weight="bold" fill="#94A3B8">公众号：<tspan fill="#005D7B">JavaGuide</tspan></text>
        <text x="0" y="20" font-size="14" font-weight="bold" fill="#94A3B8">网站：<tspan fill="#005D7B">javaguide.cn</tspan></text>
    </g>
</svg>
