<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 510" style="background-color:#F8FAFC;font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<defs>
<pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
<path d="M30 0 L0 0 0 30" fill="none" stroke="#E2E8F0" stroke-width="1"/>
</pattern>
<filter id="cs"><feDropShadow dx="2" dy="6" stdDeviation="10" flood-color="#005D7B" flood-opacity="0.08"/></filter>
<clipPath id="ca"><rect x="40" y="75" width="260" height="185" rx="10"/></clipPath>
<clipPath id="cb"><rect x="320" y="75" width="260" height="185" rx="10"/></clipPath>
<clipPath id="cc"><rect x="600" y="75" width="260" height="185" rx="10"/></clipPath>
<clipPath id="cd"><rect x="40" y="280" width="260" height="185" rx="10"/></clipPath>
<clipPath id="ce"><rect x="320" y="280" width="260" height="185" rx="10"/></clipPath>
<clipPath id="cf"><rect x="600" y="280" width="260" height="185" rx="10"/></clipPath>
</defs>
<rect width="100%" height="100%" fill="url(#grid)"/>

<text x="450" y="48" text-anchor="middle" font-size="24" font-weight="bold" fill="#005D7B">六大核心技巧速览</text>

<!-- Row 1 -->
<!-- 角色扮演 -->
<rect x="40" y="75" width="260" height="185" rx="10" fill="#FFF" filter="url(#cs)"/>
<rect x="40" y="75" width="6" height="185" fill="#4CA497" clip-path="url(#ca)"/>
<text x="60" y="102" font-size="16" font-weight="bold" fill="#2D3748">角色扮演</text>
<text x="150" y="102" font-size="11" fill="#94A3B8">Role-Playing</text>
<text x="60" y="128" font-size="12" fill="#64748B">给模型指定专家身份，激活</text>
<text x="60" y="145" font-size="12" fill="#64748B">对应知识子空间</text>
<line x1="60" y1="158" x2="280" y2="158" stroke="#E2E8F0" stroke-width="1"/>
<text x="60" y="178" font-size="11" fill="#94A3B8">粒度越精准，效果越好</text>
<rect x="60" y="220" width="84" height="22" rx="11" fill="#E6F7ED"/>
<text x="102" y="235" text-anchor="middle" font-size="10" font-weight="bold" fill="#4CA497">所有场景</text>

<!-- 思维链 CoT -->
<rect x="320" y="75" width="260" height="185" rx="10" fill="#FFF" filter="url(#cs)"/>
<rect x="320" y="75" width="6" height="185" fill="#005D7B" clip-path="url(#cb)"/>
<text x="340" y="102" font-size="16" font-weight="bold" fill="#2D3748">思维链 CoT</text>
<text x="440" y="102" font-size="11" fill="#94A3B8">Chain-of-Thought</text>
<text x="340" y="128" font-size="12" fill="#64748B">强制展示推理步骤，提升</text>
<text x="340" y="145" font-size="12" fill="#64748B">逻辑准确率，对抗幻觉</text>
<line x1="340" y1="158" x2="560" y2="158" stroke="#E2E8F0" stroke-width="1"/>
<text x="340" y="178" font-size="11" fill="#94A3B8">基础 / 引导 / 结构化 三形态</text>
<rect x="340" y="220" width="108" height="22" rx="11" fill="#E0F2F8"/>
<text x="394" y="235" text-anchor="middle" font-size="10" font-weight="bold" fill="#005D7B">复杂推理任务</text>

<!-- 少样本学习 -->
<rect x="600" y="75" width="260" height="185" rx="10" fill="#FFF" filter="url(#cs)"/>
<rect x="600" y="75" width="6" height="185" fill="#E99151" clip-path="url(#cc)"/>
<text x="620" y="102" font-size="16" font-weight="bold" fill="#2D3748">少样本学习</text>
<text x="720" y="102" font-size="11" fill="#94A3B8">Few-Shot</text>
<text x="620" y="128" font-size="12" fill="#64748B">提供 1-3 个示例，让模型</text>
<text x="620" y="145" font-size="12" fill="#64748B">学会输出格式与风格</text>
<line x1="620" y1="158" x2="840" y2="158" stroke="#E2E8F0" stroke-width="1"/>
<text x="620" y="178" font-size="11" fill="#94A3B8">超过 3 个示例收益递减</text>
<rect x="620" y="220" width="108" height="22" rx="11" fill="#FFF3E0"/>
<text x="674" y="235" text-anchor="middle" font-size="10" font-weight="bold" fill="#E99151">格式严格任务</text>

<!-- Row 2 -->
<!-- 任务分解 -->
<rect x="40" y="280" width="260" height="185" rx="10" fill="#FFF" filter="url(#cs)"/>
<rect x="40" y="280" width="6" height="185" fill="#7C3AED" clip-path="url(#cd)"/>
<text x="60" y="307" font-size="16" font-weight="bold" fill="#2D3748">任务分解</text>
<text x="150" y="307" font-size="11" fill="#94A3B8">Decomposition</text>
<text x="60" y="333" font-size="12" fill="#64748B">将复杂任务拆分为子任务，</text>
<text x="60" y="350" font-size="12" fill="#64748B">逐一完成后汇总</text>
<line x1="60" y1="363" x2="280" y2="363" stroke="#E2E8F0" stroke-width="1"/>
<text x="60" y="383" font-size="11" fill="#94A3B8">静态分解 vs 动态分解</text>
<rect x="60" y="425" width="118" height="22" rx="11" fill="#EDE9FE"/>
<text x="119" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#7C3AED">多步骤复杂任务</text>

<!-- 结构化输出 -->
<rect x="320" y="280" width="260" height="185" rx="10" fill="#FFF" filter="url(#cs)"/>
<rect x="320" y="280" width="6" height="185" fill="#0891B2" clip-path="url(#ce)"/>
<text x="340" y="307" font-size="16" font-weight="bold" fill="#2D3748">结构化输出</text>
<text x="440" y="307" font-size="11" fill="#94A3B8">Structured Output</text>
<text x="340" y="333" font-size="12" fill="#64748B">用 JSON Schema / XML</text>
<text x="340" y="350" font-size="12" fill="#64748B">定义输出，确保可解析</text>
<line x1="340" y1="363" x2="560" y2="363" stroke="#E2E8F0" stroke-width="1"/>
<text x="340" y="383" font-size="11" fill="#94A3B8">优先原生结构化输出 API</text>
<rect x="340" y="425" width="118" height="22" rx="11" fill="#E0F7FA"/>
<text x="399" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#0891B2">API 集成工程化</text>

<!-- XML 标签与预填充 -->
<rect x="600" y="280" width="260" height="185" rx="10" fill="#FFF" filter="url(#cs)"/>
<rect x="600" y="280" width="6" height="185" fill="#DC2626" clip-path="url(#cf)"/>
<text x="620" y="307" font-size="16" font-weight="bold" fill="#2D3748">XML 标签与预填充</text>
<text x="620" y="333" font-size="12" fill="#64748B">XML 标签结构化输入，</text>
<text x="620" y="350" font-size="12" fill="#64748B">预填充跳过前言进正题</text>
<line x1="620" y1="363" x2="840" y2="363" stroke="#E2E8F0" stroke-width="1"/>
<text x="620" y="383" font-size="11" fill="#94A3B8">语义命名 + 嵌套 + 一致性</text>
<rect x="620" y="425" width="128" height="22" rx="11" fill="#FEE2E2"/>
<text x="684" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#DC2626">格式一致性控制</text>

<!-- Watermark -->
<g transform="translate(735,480) rotate(-5)">
<text x="0" y="0" font-size="14" font-weight="bold" fill="#94A3B8">公众号：<tspan fill="#005D7B">JavaGuide</tspan></text>
<text x="0" y="20" font-size="14" font-weight="bold" fill="#94A3B8">网站：<tspan fill="#005D7B">javaguide.cn</tspan></text>
</g>
</svg>
