<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="1100" height="520">
  <defs>
    <style>text{font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}</style>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0L0 0 0 30" fill="none" stroke="#E2E8F0" stroke-width="0.5"/>
    </pattern>
    <filter id="sh" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="2" dy="5" stdDeviation="8" flood-color="#005D7B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1100" height="520" fill="#F8FAFC"/>
  <rect width="1100" height="520" fill="url(#grid)"/>
  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#2D3748">传统 Workflow 与 AI Workflow 对比</text>

  <!-- ====== Left: Traditional ====== -->
  <rect x="20" y="58" width="510" height="425" rx="12" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="275" y="84" text-anchor="middle" font-size="16" font-weight="bold" fill="#2D3748">传统 Workflow</text>
  <text x="275" y="102" text-anchor="middle" font-size="12" fill="#94A3B8">确定性流程编排</text>

  <!-- Nodes -->
  <g transform="translate(50,135)"><rect width="100" height="50" rx="8" fill="white" filter="url(#sh)"/><rect width="5" height="50" rx="2.5" fill="#64748B"/><text x="18" y="22" font-size="13" font-weight="bold" fill="#2D3748">输入</text><text x="18" y="38" font-size="10" fill="#64748B">固定参数</text></g>
  <g transform="translate(195,135)"><rect width="100" height="50" rx="8" fill="white" filter="url(#sh)"/><rect width="5" height="50" rx="2.5" fill="#64748B"/><text x="18" y="22" font-size="13" font-weight="bold" fill="#2D3748">处理 A</text><text x="18" y="38" font-size="10" fill="#64748B">固定逻辑</text></g>
  <g transform="translate(340,135)"><rect width="100" height="50" rx="8" fill="white" filter="url(#sh)"/><rect width="5" height="50" rx="2.5" fill="#E99151"/><text x="18" y="22" font-size="13" font-weight="bold" fill="#2D3748">判断</text><text x="18" y="38" font-size="10" fill="#64748B">金额&gt;10000?</text></g>
  <g transform="translate(340,245)"><rect width="100" height="50" rx="8" fill="white" filter="url(#sh)"/><rect width="5" height="50" rx="2.5" fill="#64748B"/><text x="18" y="22" font-size="13" font-weight="bold" fill="#2D3748">高级审批</text><text x="18" y="38" font-size="10" fill="#64748B">路径 A</text></g>
  <g transform="translate(185,335)"><rect width="100" height="50" rx="8" fill="white" filter="url(#sh)"/><rect width="5" height="50" rx="2.5" fill="#64748B"/><text x="18" y="22" font-size="13" font-weight="bold" fill="#2D3748">普通审批</text><text x="18" y="38" font-size="10" fill="#64748B">路径 B</text></g>
  <g transform="translate(185,420)"><rect width="100" height="50" rx="8" fill="white" filter="url(#sh)"/><rect width="5" height="50" rx="2.5" fill="#4CA497"/><text x="18" y="22" font-size="13" font-weight="bold" fill="#2D3748">输出</text><text x="18" y="38" font-size="10" fill="#64748B">确定结果</text></g>

  <!-- Left arrows -->
  <!-- 输入→处理A -->
  <line x1="150" y1="160" x2="193" y2="160" stroke="#64748B" stroke-width="2"/>
  <polygon points="193,160 185,155 185,165" fill="#64748B"/>
  <!-- 处理A→判断 -->
  <line x1="295" y1="160" x2="338" y2="160" stroke="#64748B" stroke-width="2"/>
  <polygon points="338,160 330,155 330,165" fill="#64748B"/>
  <!-- 判断→高级审批 (是) -->
  <line x1="390" y1="185" x2="390" y2="243" stroke="#E99151" stroke-width="2"/>
  <polygon points="390,243 385,235 395,235" fill="#E99151"/>
  <text x="402" y="220" font-size="10" fill="#E99151" font-weight="bold">是</text>
  <!-- 判断→普通审批 (否) -->
  <line x1="340" y1="170" x2="287" y2="170" stroke="#64748B" stroke-width="2"/>
  <line x1="287" y1="170" x2="287" y2="333" stroke="#64748B" stroke-width="2"/>
  <line x1="287" y1="333" x2="287" y2="333" stroke="#64748B" stroke-width="2"/>
  <polygon points="287,333 282,325 292,325" fill="#64748B"/>
  <text x="297" y="260" font-size="10" fill="#64748B" font-weight="bold">否</text>
  <!-- 高级审批→输出 -->
  <path d="M340 280 L340 300 L260 300 L260 418" stroke="#64748B" stroke-width="2" fill="none"/>
  <polygon points="260,418 255,410 265,410" fill="#64748B"/>
  <!-- 普通审批→输出 -->
  <line x1="235" y1="385" x2="235" y2="418" stroke="#64748B" stroke-width="2"/>
  <polygon points="235,418 230,410 240,410" fill="#64748B"/>

  <!-- Left annotation -->
  <text x="50" y="310" font-size="11" fill="#94A3B8">分支条件在设计时</text>
  <text x="50" y="326" font-size="11" fill="#94A3B8">已确定，运行时按</text>
  <text x="50" y="342" font-size="11" fill="#94A3B8">预定义路径执行</text>

  <!-- Divider + VS -->
  <line x1="550" y1="75" x2="550" y2="465" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="525" y="255" width="50" height="30" rx="15" fill="#2D3748"/>
  <text x="550" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="white">VS</text>

  <!-- ====== Right: AI Workflow ====== -->
  <rect x="563" y="58" width="517" height="425" rx="12" fill="none" stroke="#005D7B" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="820" y="84" text-anchor="middle" font-size="16" font-weight="bold" fill="#2D3748">AI Workflow</text>
  <text x="820" y="102" text-anchor="middle" font-size="12" fill="#94A3B8">动态决策 + 循环修正</text>

  <!-- Nodes -->
  <g transform="translate(595,130)"><rect width="105" height="50" rx="8" fill="white" filter="url(#sh)"/><rect width="5" height="50" rx="2.5" fill="#64748B"/><text x="18" y="22" font-size="13" font-weight="bold" fill="#2D3748">输入</text><text x="18" y="38" font-size="10" fill="#64748B">用户 Prompt</text></g>
  <g transform="translate(740,130)"><rect width="120" height="50" rx="8" fill="white" filter="url(#sh)"/><rect width="5" height="50" rx="2.5" fill="#005D7B"/><text x="18" y="22" font-size="13" font-weight="bold" fill="#2D3748">LLM 生成</text><text x="18" y="38" font-size="10" fill="#64748B">不确定性输出</text></g>
  <g transform="translate(905,130)"><rect width="120" height="50" rx="8" fill="white" filter="url(#sh)"/><rect width="5" height="50" rx="2.5" fill="#E99151"/><text x="18" y="22" font-size="13" font-weight="bold" fill="#2D3748">状态评估</text><text x="18" y="38" font-size="10" fill="#64748B">运行时判断</text></g>
  <g transform="translate(905,290)"><rect width="120" height="50" rx="8" fill="white" filter="url(#sh)"/><rect width="5" height="50" rx="2.5" fill="#4CA497"/><text x="18" y="22" font-size="13" font-weight="bold" fill="#2D3748">输出</text><text x="18" y="38" font-size="10" fill="#64748B">达标结果</text></g>
  <g transform="translate(740,370)"><rect width="120" height="50" rx="8" fill="white" filter="url(#sh)"/><rect width="5" height="50" rx="2.5" fill="#4CA497"/><text x="18" y="22" font-size="13" font-weight="bold" fill="#2D3748">修正</text><text x="18" y="38" font-size="10" fill="#64748B">根据反馈调整</text></g>

  <!-- State box -->
  <rect x="610" y="280" width="115" height="80" rx="10" fill="#F0F8FC" stroke="#005D7B" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="668" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#005D7B">State</text>
  <text x="668" y="318" text-anchor="middle" font-size="9" fill="#64748B">评分 / 反馈</text>
  <text x="668" y="332" text-anchor="middle" font-size="9" fill="#64748B">迭代次数 / 草稿</text>
  <text x="668" y="346" text-anchor="middle" font-size="9" fill="#64748B">对话历史</text>

  <!-- Right arrows -->
  <!-- 输入→LLM生成 -->
  <line x1="700" y1="155" x2="738" y2="155" stroke="#64748B" stroke-width="2"/>
  <polygon points="738,155 730,150 730,160" fill="#64748B"/>
  <!-- LLM生成→状态评估 -->
  <line x1="860" y1="155" x2="903" y2="155" stroke="#005D7B" stroke-width="2"/>
  <polygon points="903,155 895,150 895,160" fill="#005D7B"/>
  <!-- 状态评估→输出 (达标) -->
  <line x1="965" y1="180" x2="965" y2="288" stroke="#4CA497" stroke-width="2"/>
  <polygon points="965,288 960,280 970,280" fill="#4CA497"/>
  <text x="978" y="240" font-size="10" fill="#4CA497" font-weight="bold">达标</text>
  <!-- 状态评估→修正 (未达标): down, then left, then down -->
  <path d="M965 180 L965 250 L800 250 L800 368" stroke="#E99151" stroke-width="2" fill="none"/>
  <polygon points="800,368 795,360 805,360" fill="#E99151"/>
  <text x="875" y="242" font-size="10" fill="#E99151" font-weight="bold">未达标</text>
  <!-- 修正→LLM生成 (Loop): straight up -->
  <line x1="770" y1="370" x2="770" y2="182" stroke="#4CA497" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="770,182 765,190 775,190" fill="#4CA497"/>
  <text x="753" y="280" font-size="10" fill="#4CA497" font-weight="bold" text-anchor="end">循环</text>

  <!-- State connections -->
  <line x1="700" y1="310" x2="740" y2="180" stroke="#005D7B" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="700" y1="330" x2="905" y2="180" stroke="#005D7B" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="720" y1="350" x2="770" y2="370" stroke="#005D7B" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Right annotation -->
  <text x="590" y="435" font-size="11" fill="#94A3B8">路径由运行时状态决定</text>
  <text x="590" y="451" font-size="11" fill="#94A3B8">支持循环修正与自动收敛</text>

  <!-- Watermark -->
  <g transform="translate(800,495) rotate(-5)">
    <text font-size="14" font-weight="bold" fill="#94A3B8">公众号：<tspan fill="#005D7B">JavaGuide</tspan></text>
    <text y="20" font-size="14" font-weight="bold" fill="#94A3B8">网站：<tspan fill="#005D7B">javaguide.cn</tspan></text>
  </g>
</svg>
