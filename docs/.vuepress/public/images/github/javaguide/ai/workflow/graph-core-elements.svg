<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" style="background-color: #F8FAFC; font-family: system-ui, -apple-system, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif;">
    <defs>
        <pattern id="grid-opt" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#E2E8F0" stroke-width="1"/>
        </pattern>
        <filter id="shadow-opt" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="2" dy="6" stdDeviation="8" flood-color="#005D7B" flood-opacity="0.08" />
        </filter>
    </defs>

    <rect width="100%" height="100%" fill="url(#grid-opt)" />

    <text x="480" y="50" text-anchor="middle" font-size="24" font-weight="bold" fill="#005D7B">Graph 核心元素：Node、Edge、State</text>

    <g transform="translate(40, 90)">
        <rect width="630" height="260" rx="12" fill="#F8FAFC" stroke="#005D7B" stroke-width="2" stroke-dasharray="6,4" />
        <rect x="20" y="-12" width="140" height="24" rx="4" fill="#EBF4F6" />
        <text x="90" y="4" text-anchor="middle" font-size="14" font-weight="bold" fill="#005D7B">Graph · 结构载体</text>

        <circle cx="50" cy="80" r="20" fill="#005D7B" filter="url(#shadow-opt)" />
        <text x="50" y="84" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">START</text>

        <rect x="110" y="50" width="130" height="60" rx="8" fill="#FFFFFF" filter="url(#shadow-opt)" />
        <rect x="110" y="50" width="6" height="60" rx="3" fill="#005D7B" />
        <text x="135" y="75" font-size="14" font-weight="bold" fill="#005D7B">DraftNode</text>
        <text x="135" y="95" font-size="12" fill="#64748B">生成初稿</text>

        <rect x="300" y="50" width="130" height="60" rx="8" fill="#FFFFFF" filter="url(#shadow-opt)" />
        <rect x="300" y="50" width="6" height="60" rx="3" fill="#E99151" />
        <text x="325" y="75" font-size="14" font-weight="bold" fill="#E99151">ReviewNode</text>
        <text x="325" y="95" font-size="12" fill="#64748B">质量审核 (0-100)</text>

        <rect x="490" y="50" width="110" height="60" rx="8" fill="#FFFFFF" filter="url(#shadow-opt)" />
        <rect x="490" y="50" width="6" height="60" rx="3" fill="#4CA497" />
        <text x="515" y="75" font-size="14" font-weight="bold" fill="#005D7B">ExitNode</text>
        <text x="515" y="95" font-size="12" fill="#64748B">输出结果</text>

        <circle cx="630" cy="80" r="20" fill="#4CA497" filter="url(#shadow-opt)" />
        <text x="630" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">END</text>

        <rect x="220" y="170" width="130" height="50" rx="8" fill="#FFFFFF" filter="url(#shadow-opt)" />
        <rect x="220" y="170" width="6" height="50" rx="3" fill="#4CA497" />
        <text x="245" y="193" font-size="14" font-weight="bold" fill="#4CA497">ReviseNode</text>
        <text x="245" y="210" font-size="12" fill="#64748B">按反馈修改</text>

        <line x1="70" y1="80" x2="110" y2="80" stroke="#005D7B" stroke-width="2" />
        <polygon points="110,80 102,75 102,85" fill="#005D7B" />

        <line x1="240" y1="80" x2="300" y2="80" stroke="#005D7B" stroke-width="2" />
        <polygon points="300,80 292,75 292,85" fill="#005D7B" />

        <line x1="430" y1="80" x2="490" y2="80" stroke="#005D7B" stroke-width="2" />
        <polygon points="490,80 482,75 482,85" fill="#005D7B" />
        <text x="460" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#005D7B">达标</text>

        <line x1="600" y1="80" x2="610" y2="80" stroke="#4CA497" stroke-width="2" />
        <polygon points="610,80 602,75 602,85" fill="#4CA497" />

        <line x1="365" y1="110" x2="365" y2="195" stroke="#E99151" stroke-width="2" />
        <line x1="365" y1="195" x2="350" y2="195" stroke="#E99151" stroke-width="2" />
        <polygon points="350,195 358,190 358,200" fill="#E99151" />
        <text x="390" y="145" font-size="12" font-weight="bold" fill="#E99151">未达标</text>

        <line x1="220" y1="195" x2="160" y2="195" stroke="#4CA497" stroke-width="2" stroke-dasharray="4,4" />
        <line x1="160" y1="195" x2="160" y2="110" stroke="#4CA497" stroke-width="2" stroke-dasharray="4,4" />
        <polygon points="160,110 155,118 165,118" fill="#4CA497" />
        <text x="145" y="155" text-anchor="end" font-size="12" font-weight="bold" fill="#4CA497">重试</text>
    </g>

    <g transform="translate(690, 90)">
        <rect width="230" height="260" rx="12" fill="#FFFFFF" filter="url(#shadow-opt)" />
        <text x="20" y="30" font-size="16" font-weight="bold" fill="#005D7B">Edge 边类型</text>
        <line x1="20" y1="45" x2="210" y2="45" stroke="#E2E8F0" stroke-width="1" />

        <rect x="20" y="60" width="190" height="50" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
        <text x="35" y="80" font-size="13" font-weight="bold" fill="#005D7B">Sequential (顺序边)</text>
        <text x="35" y="100" font-size="11" fill="#64748B">按固定顺序向下执行</text>
        <line x1="150" y1="95" x2="190" y2="95" stroke="#005D7B" stroke-width="2" />
        <polygon points="190,95 184,91 184,99" fill="#005D7B" />

        <rect x="20" y="125" width="190" height="50" rx="6" fill="#FFF5ED" stroke="#FBD38D" stroke-width="1" />
        <text x="35" y="145" font-size="13" font-weight="bold" fill="#E99151">Conditional (条件边)</text>
        <text x="35" y="165" font-size="11" fill="#64748B">依据状态动态路由</text>
        <line x1="150" y1="160" x2="190" y2="160" stroke="#E99151" stroke-width="2" />
        <polygon points="190,160 184,156 184,164" fill="#E99151" />

        <rect x="20" y="190" width="190" height="50" rx="6" fill="#F2FAF8" stroke="#A0AEC0" stroke-width="1" />
        <text x="35" y="210" font-size="13" font-weight="bold" fill="#4CA497">Loop (循环边)</text>
        <text x="35" y="230" font-size="11" fill="#64748B">回溯至前序节点重试</text>
        <line x1="150" y1="225" x2="190" y2="225" stroke="#4CA497" stroke-width="2" stroke-dasharray="4,2" />
        <polygon points="190,225 184,221 184,229" fill="#4CA497" />
    </g>

    <g transform="translate(40, 380)">
        <rect width="880" height="200" rx="12" fill="#FFFFFF" filter="url(#shadow-opt)" />
        <rect width="880" height="8" rx="4" fill="#005D7B" />
        <text x="30" y="40" font-size="18" font-weight="bold" fill="#005D7B">State · 共享上下文 (字典结构持续读写)</text>
        <line x1="30" y1="55" x2="850" y2="55" stroke="#E2E8F0" stroke-width="1" />

        <rect x="30" y="70" width="180" height="35" rx="6" fill="#F0F4F8" />
        <text x="45" y="92" font-size="14" font-weight="bold" fill="#2D3748">input</text>
        <text x="160" y="92" text-anchor="end" font-size="12" fill="#94A3B8">String</text>

        <rect x="30" y="115" width="180" height="35" rx="6" fill="#F0F4F8" />
        <text x="45" y="137" font-size="14" font-weight="bold" fill="#2D3748">review_feedback</text>
        <text x="195" y="137" text-anchor="end" font-size="12" fill="#94A3B8">String</text>

        <rect x="230" y="70" width="180" height="35" rx="6" fill="#E8F4F1" stroke="#4CA497" stroke-width="1" />
        <text x="245" y="92" font-size="14" font-weight="bold" fill="#4CA497">messages (对话史)</text>
        <text x="395" y="92" text-anchor="end" font-size="12" fill="#4CA497">List</text>

        <rect x="230" y="115" width="180" height="35" rx="6" fill="#F0F4F8" />
        <text x="245" y="137" font-size="14" font-weight="bold" fill="#2D3748">iteration_count</text>
        <text x="395" y="137" text-anchor="end" font-size="12" fill="#94A3B8">Int</text>

        <rect x="430" y="70" width="180" height="35" rx="6" fill="#F0F4F8" />
        <text x="445" y="92" font-size="14" font-weight="bold" fill="#2D3748">current_draft</text>
        <text x="595" y="92" text-anchor="end" font-size="12" fill="#94A3B8">String</text>

        <rect x="430" y="115" width="180" height="35" rx="6" fill="#F0F4F8" />
        <text x="445" y="137" font-size="14" font-weight="bold" fill="#2D3748">output</text>
        <text x="595" y="137" text-anchor="end" font-size="12" fill="#94A3B8">String</text>

        <rect x="630" y="70" width="180" height="35" rx="6" fill="#F0F4F8" />
        <text x="645" y="92" font-size="14" font-weight="bold" fill="#2D3748">review_score</text>
        <text x="795" y="92" text-anchor="end" font-size="12" fill="#94A3B8">Double</text>

        <rect x="630" y="115" width="180" height="35" rx="6" fill="#F0F4F8" />
        <text x="645" y="137" font-size="14" font-weight="bold" fill="#2D3748">next_node</text>
        <text x="795" y="137" text-anchor="end" font-size="12" fill="#94A3B8">String</text>

        <rect x="30" y="160" width="820" height="30" rx="6" fill="#FFF5ED" stroke="#E99151" stroke-width="1" />
        <text x="440" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#E99151">状态更新语义规划：单值覆盖 (Replace) · 列表追加 (Append) · 自定义合并 (Reducer)</text>
    </g>

    <g transform="translate(800, 595) rotate(-5)">
        <text x="0" y="0" font-size="14" font-weight="bold" fill="#94A3B8">公众号：<tspan fill="#005D7B">JavaGuide</tspan></text>
        <text x="0" y="20" font-size="14" font-weight="bold" fill="#94A3B8">网站：<tspan fill="#005D7B">javaguide.cn</tspan></text>
    </g>
</svg>
